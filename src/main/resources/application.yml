spring:
  application:
    name: skipq-core

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    filter:
      order: 10

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  resend:
    api-key: ${RESEND_API_KEY}
    from: ${RESEND_FROM_EMAIL}
  razorpay:
    key-id: ${RAZOR_TEST_ID}
    key-secret: ${RAZOR_TEST_SECRET}
  deep-link:
    base-url: ${DEEP_LINK_BASE_URL}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
