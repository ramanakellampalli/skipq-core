spring:
  application:
    name: skipq-core

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  security:
    filter:
      order: 10

app:
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket-name: ${R2_BUCKET_NAME:skipq-images}
    public-url: ${R2_PUBLIC_URL:}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  resend:
    api-key: ${RESEND_API_KEY}
    from: ${RESEND_FROM_EMAIL}
  razorpay:
    key-id: ${RAZOR_TEST_ID}
    key-secret: ${RAZOR_TEST_SECRET}
    webhook-secret: ${RAZOR_WEBHOOK_SECRET}
  deep-link:
    base-url: ${DEEP_LINK_BASE_URL}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
