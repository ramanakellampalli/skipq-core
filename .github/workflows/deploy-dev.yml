name: Deploy to Cloud Run (dev)

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE: skipq-core-dev
  IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/skipq-core/skipq-core

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Run database migrations
        run: |
          mvn flyway:migrate \
            -Dflyway.url=${{ secrets.DEV_MIGRATE_DB_URL }} \
            -Dflyway.user=${{ secrets.DEV_MIGRATE_DB_USERNAME }} \
            -Dflyway.password=${{ secrets.DEV_MIGRATE_DB_PASSWORD }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:dev-$GITHUB_SHA -t $IMAGE:dev-latest .
          docker push $IMAGE:dev-$GITHUB_SHA
          docker push $IMAGE:dev-latest

      - name: Deploy to Cloud Run (dev)
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:dev-$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --port 8080 \
            --set-env-vars "SPRING_PROFILES_ACTIVE=dev" \
            --set-secrets "JWT_SECRET=JWT_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,RESEND_FROM_EMAIL=RESEND_FROM_EMAIL:latest,DEEP_LINK_BASE_URL=DEEP_LINK_BASE_URL:latest,DEV_DB_URL=DEV_DB_URL:latest,DEV_DB_USERNAME=DEV_DB_USERNAME:latest,DEV_DB_PASSWORD=DEV_DB_PASSWORD:latest,ABLY_API_KEY=ABLY_API_KEY:latest,RAZOR_TEST_ID=RAZOR_TEST_ID:latest,RAZOR_TEST_SECRET=RAZOR_TEST_SECRET:latest,RAZOR_WEBHOOK_SECRET=RAZOR_WEBHOOK_SECRET:latest"
