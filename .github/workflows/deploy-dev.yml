name: Deploy to Oracle VM (dev)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Run database migrations
        env:
          FLYWAY_URL: ${{ secrets.DEV_MIGRATE_DB_URL }}
          FLYWAY_USER: ${{ secrets.DEV_MIGRATE_DB_USERNAME }}
          FLYWAY_PASSWORD: ${{ secrets.DEV_MIGRATE_DB_PASSWORD }}
        run: mvn flyway:migrate

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_DEV_SSH_KEY }}" > ~/.ssh/oracle-dev.key
          chmod 600 ~/.ssh/oracle-dev.key
          ssh-keyscan -H ${{ secrets.ORACLE_DEV_HOST }} >> ~/.ssh/known_hosts

      - name: Copy JAR to VM
        run: |
          scp -i ~/.ssh/oracle-dev.key \
            target/skipq-core-0.0.1-SNAPSHOT.jar \
            ubuntu@${{ secrets.ORACLE_DEV_HOST }}:/home/ubuntu/skipq/skipq-core.jar

      - name: Write env file and restart service
        run: |
          ssh -i ~/.ssh/oracle-dev.key ubuntu@${{ secrets.ORACLE_DEV_HOST }} << 'EOF'
          cat > /home/ubuntu/skipq/.env << ENVEOF
          SPRING_PROFILES_ACTIVE=dev
          DEV_DB_URL=${{ secrets.DEV_DB_URL }}
          DEV_DB_USERNAME=${{ secrets.DEV_DB_USERNAME }}
          DEV_DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          DEEP_LINK_BASE_URL=${{ secrets.DEEP_LINK_BASE_URL }}
          ABLY_API_KEY=${{ secrets.ABLY_API_KEY }}
          RAZOR_TEST_ID=${{ secrets.RAZOR_TEST_ID }}
          RAZOR_TEST_SECRET=${{ secrets.RAZOR_TEST_SECRET }}
          RAZOR_WEBHOOK_SECRET=${{ secrets.RAZOR_WEBHOOK_SECRET }}
          R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME=skipq-images
          R2_PUBLIC_URL=https://pub-1a1d55258a2b4bd5affe723c3fed4dcd.r2.dev
          FIREBASE_PROJECT_ID=skipq-0521
          ENVEOF
          sudo systemctl restart skipq-core
          EOF
