name: Deploy to Cloud Run (prod)

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE: skipq-core
  IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/skipq-core/skipq-core

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Run database migrations
        env:
          FLYWAY_URL: ${{ secrets.PROD_MIGRATE_DB_URL }}
          FLYWAY_USER: ${{ secrets.PROD_MIGRATE_DB_USERNAME }}
          FLYWAY_PASSWORD: ${{ secrets.PROD_MIGRATE_DB_PASSWORD }}
        run: mvn flyway:migrate

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run (prod)
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --port 8080 \
            --set-env-vars "SPRING_PROFILES_ACTIVE=prod,R2_BUCKET_NAME=skipq-images,R2_PUBLIC_URL=https://pub-1a1d55258a2b4bd5affe723c3fed4dcd.r2.dev,FIREBASE_PROJECT_ID=skipq-0521" \
            --set-secrets "JWT_SECRET=JWT_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,RESEND_FROM_EMAIL=RESEND_FROM_EMAIL:latest,DEEP_LINK_BASE_URL=DEEP_LINK_BASE_URL:latest,PROD_DB_URL=PROD_DB_URL:latest,PROD_DB_USERNAME=PROD_DB_USERNAME:latest,PROD_DB_PASSWORD=PROD_DB_PASSWORD:latest,ABLY_API_KEY=ABLY_API_KEY:latest,RAZOR_TEST_ID=RAZOR_TEST_ID:latest,RAZOR_TEST_SECRET=RAZOR_TEST_SECRET:latest,RAZOR_WEBHOOK_SECRET=RAZOR_WEBHOOK_SECRET:latest,R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest,R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest,R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest"
